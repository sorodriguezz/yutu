name: CI

# Verifica que el proyecto compile (tipos + assets) en cada push y PR.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check & build
        run: npm run build
